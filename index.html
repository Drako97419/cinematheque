<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Cinémathèque</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0b14; font-family: 'Palatino Linotype', Palatino, serif; color: #ddd6c8; min-height: 100vh; }

  #header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(11,11,20,0.97);
    border-bottom: 1px solid #1c1c2e;
    padding: 20px 18px 14px;
    backdrop-filter: blur(10px);
  }
  .header-inner { max-width: 1400px; margin: 0 auto; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header-center { text-align: center; flex: 1; }
  .header-label { font-size: 13px; letter-spacing: 5px; color: #E8C547; font-family: monospace; text-transform: uppercase; margin-bottom: 3px; }
  .header-title { font-size: 26px; font-weight: 400; letter-spacing: -0.5px; color: #f0e8d8; }
  .counter-box { background: #13131f; border: 1px solid #1c1c2e; border-radius: 10px; padding: 8px 14px; text-align: center; min-width: 90px; }
  .counter-num { font-size: 20px; font-weight: 700; font-family: monospace; color: #E8C547; }
  .counter-total { color: #333; font-size: 12px; }
  .counter-label { font-size: 8px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin: 3px 0 5px; }
  .counter-bar-bg { height: 3px; background: #1a1a2e; border-radius: 2px; width: 60px; margin: 0 auto; }
  .counter-bar { height: 100%; background: linear-gradient(90deg,#E8C547,#e07c3a); border-radius: 2px; transition: width 0.4s; }

  #search {
    width: 100%; background: #13131f; border: 1px solid #1c1c2e;
    border-radius: 8px; padding: 9px 13px; color: #ddd6c8;
    font-size: 13px; font-family: inherit; outline: none; margin-bottom: 12px;
    transition: border 0.2s;
  }
  #search:focus { border-color: #E8C547; }

  .tabs { display: flex; gap: 8px; }
  .tab-btn {
    flex: 1; padding: 8px 0; border-radius: 7px; font-size: 13px;
    cursor: pointer; font-family: inherit; transition: all 0.2s; border: 1px solid #1c1c2e;
    background: #13131f; color: #777; font-weight: 400;
  }
  .tab-btn.active { background: #E8C547; color: #0b0b14; border-color: #E8C547; font-weight: 700; }

  /* À Découvrir */
  .dec-form { background:#13131f; border:1px solid #1c1c2e; border-radius:12px; padding:16px; margin-bottom:20px; }
  .dec-form-title { font-size:13px; letter-spacing:2px; color:#E8C547; text-transform:uppercase; margin-bottom:12px; }
  .dec-item { display:flex; align-items:flex-start; gap:12px; padding:14px; background:#13131f; border:1px solid #1c1c2e; border-radius:10px; margin-bottom:8px; }
  .dec-type-badge { font-size:11px; background:#1c1c2e; border-radius:6px; padding:4px 8px; white-space:nowrap; color:#aaa; }
  .dec-info { flex:1; }
  .dec-title-text { font-size:15px; color:#f0e8d8; margin-bottom:4px; }
  .dec-note-text { font-size:12px; color:#888; font-style:italic; margin-bottom:4px; }
  .dec-date { font-size:10px; color:#444; letter-spacing:1px; }
  .dec-remove { background:none; border:none; color:#555; font-size:14px; cursor:pointer; padding:2px 6px; border-radius:4px; transition:color 0.2s; }
  .dec-remove:hover { color:#f87171; }
  .sl-chip-upcoming { cursor: default !important; opacity: 0.4; }

  #content { max-width: 1400px; margin: 0 auto; padding: 16px 24px 60px; }

  .genre-block { margin-bottom: 28px; }
  .genre-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    padding-bottom: 7px; border-bottom: 1px solid #1c1c2e;
  }
  .genre-name { flex: 1; font-size: 14px; font-weight: 600; color: #f0e8d8; }
  .genre-count { font-size: 11px; font-family: monospace; }
  .genre-bar-bg { width: 44px; height: 3px; background: #1a1a2e; border-radius: 2px; }
  .genre-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .saga-block { margin-bottom: 10px; background: #13131f; border: 1px solid #1c1c2e; border-radius: 10px; overflow: hidden; }
  .saga-header {
    padding: 8px 14px; background: #0f0f1c; border-bottom: 1px solid #1c1c2e;
    display: flex; justify-content: space-between; align-items: center;
  }
  .saga-name { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #E8C547; font-family: monospace; }
  .saga-count { font-size: 10px; color: #444; font-family: monospace; }

  .episode-row {
    display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    border-bottom: 1px solid #161626; cursor: pointer;
    transition: background 0.15s;
  }
  .episode-row:last-child { border-bottom: none; }
  .episode-row:hover { background: rgba(255,255,255,0.03); }
  .episode-row.seen { background: rgba(74,222,128,0.05); }
  .episode-row.seen:hover { background: rgba(74,222,128,0.08); }
  .episode-row.soon { cursor: default; }

  .poster-wrap {
    width: 36px; height: 54px; border-radius: 4px; overflow: hidden;
    flex-shrink: 0; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #2a2a3e; font-size: 16px;
  }
  .poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster-wrap.loading { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

  .checkbox {
    width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
    border: 2px solid #333; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .checkbox.checked { border-color: #4ade80; background: #4ade80; }
  .checkbox.disabled { border-color: #222; }
  .checkmark { font-size: 11px; color: #0b0b14; font-weight: 900; display: none; }
  .checkbox.checked .checkmark { display: block; }

  .ep-label { font-size: 13px; flex: 1; color: #c0b8a8; transition: color 0.15s; }
  .ep-label.seen { color: #4ade80; text-decoration: line-through; }
  .ep-label.soon { color: #2a2a4a; font-style: italic; }

  .soon-badge {
    font-size: 9px; color: #e07c3a; background: #1e1020;
    padding: 2px 7px; border-radius: 4px; font-family: monospace; letter-spacing: 1px;
  }

  .empty { text-align: center; padding: 60px 0; color: #333; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }
  .empty-text span { color: #E8C547; }

  /* CLASSEMENT */
  .top-section { margin-bottom: 32px; }
  .top-section-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #E8C547; font-family: monospace; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #1c1c2e; }
  .top-slot {
    display: flex; align-items: center; gap: 12px;
    background: #13131f; border: 1px solid #1c1c2e; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px; min-height: 72px;
    transition: border-color 0.2s;
  }
  .top-slot.filled { border-color: #2a2a4a; }
  .top-rank {
    font-size: 22px; font-weight: 700; font-family: monospace;
    width: 36px; text-align: center; flex-shrink: 0;
  }
  .rank-1 { color: #FFD700; }
  .rank-2 { color: #C0C0C0; }
  .rank-3 { color: #CD7F32; }
  .rank-other { color: #444; }
  .top-poster { width: 36px; height: 54px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #1a1a2e; border: 1px solid #2a2a3e; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .top-poster img { width: 100%; height: 100%; object-fit: cover; }
  .top-info { flex: 1; min-width: 0; }
  .top-title { font-size: 13px; color: #f0e8d8; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-empty-label { font-size: 12px; color: #333; font-style: italic; }
  .top-remove { background: none; border: none; color: #444; cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: color 0.2s; }
  .top-remove:hover { color: #e05c2a; }
  .top-add-btn {
    width: 100%; padding: 10px; background: transparent; border: 1px dashed #2a2a3e;
    border-radius: 8px; color: #444; font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.2s; margin-top: 4px;
  }
  .top-add-btn:hover { border-color: #E8C547; color: #E8C547; }

  /* ── FORMAT LIGNE (Animés + Séries) ── */
  .season-row {
    display: flex; align-items: center; gap: 0;
    padding: 9px 14px; border-bottom: 1px solid #161626;
    flex-wrap: wrap; row-gap: 6px;
  }
  .season-row:last-child { border-bottom: none; }
  .season-row:hover { background: rgba(255,255,255,0.03); }

  /* Affiche à gauche */
  .sl-poster {
    width: 32px; height: 48px; border-radius: 4px; overflow: hidden;
    flex-shrink: 0; background: #1a1a2e; border: 1px solid #2a2a3e;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    margin-right: 10px;
  }
  .sl-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sl-poster.loading { animation: pulse 1.5s infinite; }

  /* Nom de l'œuvre */
  .sl-title {
    font-size: 13px; color: #c0b8a8; flex-shrink: 0;
    margin-right: 10px; white-space: nowrap;
  }

  /* Groupe de saisons (cases à cocher) */
  .sl-seasons { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex: 1; }

  /* Chip saison individuel */
  .sl-chip {
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; padding: 3px 7px; border-radius: 6px;
    background: #13131f; border: 1px solid #2a2a3e;
    transition: all 0.15s; user-select: none;
  }
  .sl-chip:hover { border-color: #E8C547; }
  .sl-chip.checked { background: rgba(74,222,128,0.1); border-color: #4ade80; }
  .sl-chip-label { font-size: 10px; color: #777; font-family: monospace; }
  .sl-chip.checked .sl-chip-label { color: #4ade80; }
  .sl-chip-box {
    width: 12px; height: 12px; border-radius: 3px;
    border: 1.5px solid #444; background: transparent;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .sl-chip.checked .sl-chip-box { border-color: #4ade80; background: #4ade80; }
  .sl-chip-check { font-size: 8px; color: #0b0b14; font-weight: 900; display: none; }
  .sl-chip.checked .sl-chip-check { display: block; }

  /* Zone statut à droite */
  .sl-status { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; margin-left: 8px; gap: 3px; }

  .status-badge {
    font-size: 9px; font-family: monospace; letter-spacing: 0.8px;
    padding: 3px 8px; border-radius: 5px; white-space: nowrap;
    text-align: center; font-weight: 700;
  }
  .status-termine   { background: #0d2010; color: #4ade80;  border: 1px solid #1a4020; }
  .status-en-cours  { background: #0d1520; color: #60a5fa;  border: 1px solid #1a3050; }
  .status-en-attente{ background: #1a1505; color: #facc15;  border: 1px solid #3a3010; }
  .status-inacheve  { background: #1a0808; color: #f87171;  border: 1px solid #3a1010; }

  .sl-date { font-size: 9px; color: #60a5fa; font-family: monospace; white-space: nowrap; }
  .sl-proba { font-size: 9px; color: #888; font-family: monospace; white-space: nowrap; }
  .proba-bar-bg { height: 3px; background: #1a1a2e; border-radius: 2px; margin-top: 2px; width: 70px; }
  .proba-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #13131f; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; width: 90%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; }
  .modal-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #E8C547; font-family: monospace; margin-bottom: 12px; }
  .modal-search { width: 100%; background: #0b0b14; border: 1px solid #2a2a3e; border-radius: 8px; padding: 9px 13px; color: #ddd6c8; font-size: 13px; font-family: inherit; outline: none; margin-bottom: 12px; }
  .modal-search:focus { border-color: #E8C547; }
  .modal-list { overflow-y: auto; flex: 1; }
  .modal-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; }
  .modal-item:hover { background: rgba(255,255,255,0.05); }
  .modal-item-poster { width: 28px; height: 42px; border-radius: 3px; overflow: hidden; background: #1a1a2e; border: 1px solid #2a2a3e; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .modal-item-poster img { width: 100%; height: 100%; object-fit: cover; }
  .modal-item-label { font-size: 13px; color: #c0b8a8; }
  .modal-close { background: none; border: 1px solid #2a2a3e; border-radius: 7px; color: #777; padding: 8px 16px; cursor: pointer; font-family: inherit; margin-top: 12px; width: 100%; transition: all 0.2s; }
  .modal-close:hover { border-color: #E8C547; color: #E8C547; }

  /* ── TOGGLE VUE ── */
  .view-toggle { display:flex; gap:0; border:1px solid #2a2a3e; border-radius:7px; overflow:hidden; }
  .view-btn { padding:5px 10px; background:transparent; border:none; color:#555; cursor:pointer; font-size:14px; transition:all 0.15s; font-family:inherit; }
  .view-btn.active { background:#1c1c2e; color:#E8C547; }
  .view-btn:hover:not(.active) { color:#aaa; }

  /* ── MODE CARTE ── */
  .cards-grid-wrap { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
  .c-card { background:#13131f; border:1px solid #1c1c2e; border-radius:10px; overflow:hidden; transition:transform 0.15s,border-color 0.15s; }
  .c-card:hover { transform:translateY(-2px); border-color:#2a2a3e; }
  .c-poster { width:100%; aspect-ratio:2/3; background:#0f0f1c; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .c-poster img { width:100%; height:100%; object-fit:cover; display:block; }
  .c-poster-icon { font-size:28px; opacity:0.15; }
  .c-status-badge { position:absolute; top:5px; left:5px; font-size:8px; font-weight:700; padding:2px 5px; border-radius:4px; font-family:monospace; letter-spacing:0.5px; text-transform:uppercase; }
  .csb-termine { background:#0d2010; color:#4ade80; border:1px solid #1a4020; }
  .csb-en-cours { background:#0d1520; color:#60a5fa; border:1px solid #1a3050; }
  .csb-en-attente { background:#1a1505; color:#facc15; border:1px solid #3a3010; }
  .csb-inacheve { background:#1a0808; color:#f87171; border:1px solid #3a1010; }
  .c-body { padding:7px 8px 9px; }
  .c-title { font-size:11px; color:#c0b8a8; line-height:1.3; margin-bottom:5px; min-height:28px; }
  .c-chips { display:flex; gap:3px; flex-wrap:wrap; }
  .c-chip { font-size:9px; padding:2px 5px; border:1px solid #2a2a3e; border-radius:4px; color:#555; cursor:pointer; transition:all 0.1s; font-family:monospace; user-select:none; }
  .c-chip:hover { border-color:#E8C547; color:#E8C547; }
  .c-chip.done { background:rgba(74,222,128,0.12); border-color:#4ade80; color:#4ade80; }
  .c-chip.locked { opacity:0.3; cursor:default; border-style:dashed; }
  .c-chip.locked:hover { border-color:#2a2a3e; color:#555; }
  .c-chip.film-chip { border-color:#E8C547; color:#E8C547; font-size:8px; }
  .c-chip.film-chip.done { background:rgba(74,222,128,0.12); border-color:#4ade80; color:#4ade80; }
  .c-genre-header { grid-column:1/-1; display:flex; align-items:center; gap:10px; margin-bottom:4px; margin-top:8px; padding-bottom:7px; border-bottom:1px solid #1c1c2e; }
</style>
</head>
<body>

<div id="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="view-toggle" id="view-toggle" style="display:none;">
        <button class="view-btn active" id="btn-liste" onclick="setView('liste')" title="Vue liste">☰</button>
        <button class="view-btn" id="btn-carte" onclick="setView('carte')" title="Vue carte">⊞</button>
      </div>
      <div class="header-center">
        <div class="header-label">Ma Cinémathèque</div>
        <div class="header-title">Films &amp; Séries</div>
      </div>
      <div class="counter-box">
        <div class="counter-num"><span id="done-count">0</span><span class="counter-total">/<span id="total-count">0</span></span></div>
        <div class="counter-label">vus</div>
        <div class="counter-bar-bg"><div class="counter-bar" id="global-bar" style="width:0%"></div></div>
      </div>
    </div>
    <input type="text" id="search" placeholder="🔍  Rechercher..." oninput="filterContent()" />
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('films', this)">🎬 FILMS</button>
      <button class="tab-btn" onclick="switchTab('series', this)">📺 SÉRIES</button>
      <button class="tab-btn" onclick="switchTab('anime', this)">🎌 ANIMÉS</button>
      <button class="tab-btn" onclick="switchTab('classement', this)">🏆 TOP 10</button>
      <button class="tab-btn" onclick="switchTab('decouvrir', this)">🎯 À DÉCOUVRIR</button>
    </div>
  </div>
</div>

<div id="content"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Choisir un film / série</div>
    <input class="modal-search" id="modal-search" placeholder="🔍 Rechercher..." oninput="filterModal()" />
    <div class="modal-list" id="modal-list"></div>
    <button class="modal-close" onclick="closeModal()">Annuler</button>
  </div>
</div>

<script>
const TMDB_KEY = '365dba2026fde0bf9327e68e1a1bc0f3';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w500';

let posterCache = {};
try { posterCache = JSON.parse(localStorage.getItem('cinePosterCache') || '{}'); } catch(e) {}

async function fetchPoster(searchTitle, isSeries) {
  const cacheKey = searchTitle;
  if (posterCache[cacheKey] !== undefined) return posterCache[cacheKey];
  try {
    const type = isSeries ? 'tv' : 'movie';
    const url = `https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(searchTitle)}&language=fr-FR`;
    const res = await fetch(url);
    const data = await res.json();
    const path = data.results?.[0]?.poster_path || null;
    const full = path ? TMDB_IMG + path : '';
    posterCache[cacheKey] = full;
    try { localStorage.setItem('cinePosterCache', JSON.stringify(posterCache)); } catch(e) {}
    return full;
  } catch { return ''; }
}

// ── GESTION VUE LISTE / CARTE ──
let currentView = 'liste';
try { currentView = localStorage.getItem('cineView') || 'liste'; } catch(e) {}

function setView(v) {
  currentView = v;
  try { localStorage.setItem('cineView', v); } catch(e) {}
  document.getElementById('btn-liste').classList.toggle('active', v === 'liste');
  document.getElementById('btn-carte').classList.toggle('active', v === 'carte');
  if (activeTab === 'anime') renderAnime();
  else if (activeTab === 'films' || activeTab === 'series') render();
}

function showViewToggle(show) {
  document.getElementById('view-toggle').style.display = show ? 'flex' : 'none';
}

const DATA = {
  films: {
    "🚗 Action / Aventure": [
      { saga: "Au Cœur de l'Océan", items: [{label:"Au Cœur de l'Océan", search:"In the Heart of the Sea 2015"}]},
      { saga: "Les 3 Mousquetaires (2011)", items: [{label:"Les 3 Mousquetaires (2011)", search:"The Three Musketeers 2011"}]},
      { saga: "Seul au Monde", items: [{label:"Seul au Monde", search:"Cast Away 2000 Tom Hanks"}]},
      { saga: "Gemini Man", items: [{label:"Gemini Man", search:"Gemini Man 2019 Will Smith"}]},
      { saga: "La Chute de la Maison Blanche", items: [
        {label:"La Chute de la Maison Blanche", search:"Olympus Has Fallen 2013"},
        {label:"London Has Fallen", search:"London Has Fallen 2016"},
        {label:"Angel Has Fallen", search:"Angel Has Fallen 2019"}
      ]},
      { saga: "La Chute du Président", items: [{label:"La Chute du Président", search:"White House Down 2013"}]},
      { saga: "Fast & Furious", items: [
        {label:"Fast & Furious 1", search:"Fast X 2023 Vin Diesel"},
        {label:"2 Fast 2 Furious", search:"2 Fast 2 Furious 2003"},
        {label:"Tokyo Drift", search:"The Fast and the Furious Tokyo Drift 2006"},
        {label:"Fast & Furious 4", search:"Fast Furious 2009 Vin Diesel"},
        {label:"Fast Five", search:"Fast Five 2011 Vin Diesel"},
        {label:"Fast & Furious 6", search:"Fast Furious 6 2013"},
        {label:"Furious 7", search:"Furious 7 2015 Vin Diesel"},
        {label:"Fast 8", search:"The Fate of the Furious 2017"},
        {label:"Hobbs & Shaw (spin-off)", search:"Hobbs and Shaw 2019"},
        {label:"Fast 9", search:"F9 Fast Saga 2021 Vin Diesel"},
        {label:"Fast X", search:"Fast X 2023 Vin Diesel"},
        {label:"Fast & Furious 11", search:"Fast Furious 11 2025"}
      ]},
      { saga: "Pirates des Caraïbes", items: [

let animeChecked = {};
try { animeChecked = JSON.parse(localStorage.getItem('animeChecked_v1') || '{}'); } catch(e) {}

function saveAnimeChecked() {
  try { localStorage.setItem('animeChecked_v1', JSON.stringify(animeChecked)); } catch(e) {}
}

function toggleAnimeSaison(key) {
  animeChecked[key] = !animeChecked[key];
  saveAnimeChecked();
  // Retrouver le chip via data-akey plutôt que CSS.escape sur onclick
  const chip = document.querySelector(`.sl-chip[data-akey="${key.replace(/"/g,'&quot;')}"]`);
  if (chip) chip.classList.toggle('checked', animeChecked[key]);
  const row = chip ? chip.closest('.season-row') : null;
  if (row) refreshAnimeGenreBar(row);
  updateGlobalCounter();
}

function refreshAnimeGenreBar(row) {
  const block = row.closest('.genre-block');
  if (!block) return;
  const chips = [...block.querySelectorAll('.sl-chip[data-akey]')];
  const done = chips.filter(c => animeChecked[c.dataset.akey]).length;
  const total = chips.length;
  const pct = total > 0 ? (done/total)*100 : 0;
  const color = done === total && total > 0 ? '#4ade80' : '#E8C547';
  const gc = block.querySelector('.genre-count');
  if (gc) { gc.textContent = `${done}/${total}`; gc.style.color = color; }
  const bar = block.querySelector('.genre-bar');
  if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
}

function getStatusHTML(anime) {
  const { statut, datePrevu, proba } = anime;
  const labels = { 'termine':'TERMINÉ','en-cours':'EN COURS','en-attente':'EN ATTENTE','inacheve':'INACHEVÉ' };
  let html = `<span class="status-badge status-${statut}">${labels[statut]||statut}</span>`;
  if (statut === 'en-cours' && datePrevu) {
    html += `<span class="sl-date">📅 ${datePrevu}</span>`;
  } else if (statut === 'en-attente' && proba !== undefined) {
    const pc = proba >= 80 ? '#4ade80' : proba >= 50 ? '#facc15' : '#f87171';
    html += `<span class="sl-proba" style="color:${pc}">${proba}% suite</span>
      <div class="proba-bar-bg"><div class="proba-bar" style="width:${proba}%;background:${pc}"></div></div>`;
  }
  return html;
}

function renderAnime() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const content = document.getElementById('content');
  updateGlobalCounter();

  // ── MODE CARTE ──
  if (currentView === 'carte') {
    renderCarteAnime(search);
    return;
  }

  let html = '', anyVisible = false;

  Object.entries(ANIME_DATA).forEach(([genre, animes]) => {
    const filtered = search ? animes.filter(a => a.titre.toLowerCase().includes(search)) : animes;
    if (!filtered.length) return;
    anyVisible = true;

    // Comptage : 1 point par saison cochée, ou 1 pour les films
    let gDone = 0, gTotal = 0;
    filtered.forEach(a => {
      const saisonsDispo = a.episodesSortis !== undefined ? a.episodesSortis : (a.film ? 1 : a.saisons);
      if (a.film) {
        if (saisonsDispo > 0) {
          gTotal++;
          if (animeChecked[`anime||${a.titre}||Film`]) gDone++;
        }
      } else {
        for (let s = 1; s <= saisonsDispo; s++) {
          gTotal++;
          if (animeChecked[`anime||${a.titre}||S${s}`]) gDone++;
        }
      }
    });
    const gPct = gTotal > 0 ? (gDone/gTotal)*100 : 0;
    const gColor = gDone === gTotal && gTotal > 0 ? '#4ade80' : '#E8C547';

    html += `<div class="genre-block">
      <div class="genre-header">
        <span class="genre-name">${genre}</span>
        <span class="genre-count" style="color:${gColor}">${gDone}/${gTotal}</span>
        <div class="genre-bar-bg"><div class="genre-bar" style="width:${gPct}%;background:${gColor}"></div></div>
      </div><div class="saga-block">`;

    filtered.forEach(anime => {
      const cached = posterCache[anime.search];
      let posterHTML;
      if (cached !== undefined) {
        posterHTML = cached
          ? `<div class="sl-poster"><img src="${cached}" alt="" onerror="this.parentElement.innerHTML='🎌'"/></div>`
          : `<div class="sl-poster">🎌</div>`;
      } else {
        posterHTML = `<div class="sl-poster loading" data-search="${anime.search.replace(/"/g,'&quot;')}"></div>`;
      }

      // Chips saisons (ou "Film" si c'est un film)
      // episodesSortis : nombre de saisons dont les épisodes sont sortis (défaut = toutes)
      const saisonsDispo = anime.episodesSortis !== undefined ? anime.episodesSortis : (anime.film ? 1 : anime.saisons);

      let chipsHTML = '';
      if (anime.film) {
        // Film : chip toujours présent sauf si episodesSortis explicitement mis à 0
        if (saisonsDispo > 0) {
          const key = `anime||${anime.titre}||Film`;
          const isSeen = !!animeChecked[key];
          const keyAttr = key.replace(/"/g,'&quot;');
          chipsHTML = `<div class="sl-chip${isSeen?' checked':''}" data-akey="${keyAttr}" onclick="event.stopPropagation();toggleAnimeSaison(this.dataset.akey)">
            <span class="sl-chip-label">Film</span>
            <div class="sl-chip-box"><span class="sl-chip-check">✓</span></div>
          </div>`;
        } else {
          chipsHTML = `<div class="sl-chip-soon">Pas encore sorti</div>`;
        }
      } else {
        for (let s = 1; s <= anime.saisons; s++) {
          if (s <= saisonsDispo) {
            // Saison sortie → chip cliquable
            const key = `anime||${anime.titre}||S${s}`;
            const isSeen = !!animeChecked[key];
            const keyAttr = key.replace(/"/g,'&quot;');
            chipsHTML += `<div class="sl-chip${isSeen?' checked':''}" data-akey="${keyAttr}" onclick="event.stopPropagation();toggleAnimeSaison(this.dataset.akey)">
              <span class="sl-chip-label">S${s}</span>
              <div class="sl-chip-box"><span class="sl-chip-check">✓</span></div>
            </div>`;
          } else {
            // Saison pas encore sortie → badge grisé non cliquable
            chipsHTML += `<div class="sl-chip sl-chip-upcoming">
              <span class="sl-chip-label">S${s}</span>
              <div class="sl-chip-box" style="border-style:dashed;opacity:0.4;"></div>
            </div>`;
          }
        }
      }

      html += `<div class="season-row">
        ${posterHTML}
        <span class="sl-title">${anime.titre}</span>
        <div class="sl-seasons">${chipsHTML}</div>
        <div class="sl-status">${getStatusHTML(anime)}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!anyVisible) {
    const q = document.getElementById('search').value;
    html = `<div class="empty"><div class="empty-icon">🎌</div><div class="empty-text">Aucun résultat pour «<span> ${q} </span>»</div></div>`;
  }
  content.innerHTML = html;
  loadVisiblePosters();
}

function getAllTitles(type) {

  const result = [];
  Object.values(section).forEach(sagas =>
    sagas.forEach(s => s.items.forEach(item => {
      if (!item.label.includes('à venir')) result.push({ label: item.label, search: item.search, saga: s.saga });
    }))
  );
  return result;
}

function getAllAnimeTitles() {
  const result = [];
  Object.values(ANIME_DATA).forEach(animes =>
    animes.forEach(a => result.push({ label: a.titre, search: a.search, saga: a.titre }))
  );
  return result;
}

function openModal(slotIndex, type) {
  modalSlotIndex = slotIndex;
  modalSlotType = type;
  document.getElementById('modal-search').value = '';
  filterModal();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function filterModal() {
  const q = document.getElementById('modal-search').value.toLowerCase();
  const isAnime = modalSlotType === 'anime';
  const titles = isAnime ? getAllAnimeTitles() : getAllTitles(modalSlotType === 'films' ? 'films' : 'series');
  const list = document.getElementById('modal-list');
  const current = isAnime ? topAnime : (modalSlotType === 'films' ? topFilms : topSeries);
  const usedLabels = current.filter(Boolean).map(t => t.label);

  const filtered = titles.filter(t => !usedLabels.includes(t.label) && (!q || t.label.toLowerCase().includes(q) || t.saga.toLowerCase().includes(q)));

  list.innerHTML = filtered.slice(0, 50).map(t => {
    const cached = posterCache[t.search];
    const icon = isAnime ? '🎌' : (modalSlotType === 'films' ? '🎬' : '📺');
    const posterHTML = cached
      ? `<div class="modal-item-poster"><img src="${cached}" /></div>`
      : `<div class="modal-item-poster" data-msearch="${t.search.replace(/"/g,'&quot;')}">${icon}</div>`;
    return `<div class="modal-item" data-mlabel="${t.label.replace(/"/g,'&quot;')}" data-msearchval="${t.search.replace(/"/g,'&quot;')}" onclick="selectTitle(this.dataset.mlabel, this.dataset.msearchval)">
      ${posterHTML}
      <span class="modal-item-label">${t.label}</span>
    </div>`;
  }).join('');

  list.querySelectorAll('[data-msearch]').forEach(async el => {
    const s = el.getAttribute('data-msearch');
    el.removeAttribute('data-msearch');
    const isSeries = modalSlotType === 'series';
    const url = await fetchPoster(s, isSeries);
    if (url) el.innerHTML = `<img src="${url}" />`;
  });
}

  const arr = modalSlotType === 'anime' ? topAnime : (modalSlotType === 'films' ? topFilms : topSeries);
  arr[modalSlotIndex] = { label, search };
  saveTop();
  closeModal();
  renderClassement();
}

function renderClassement() {
  const content = document.getElementById('content');
  const MEDALS = ['🥇','🥈','🥉'];

  const renderSection = (title, arr, type) => {
    const icon = type === 'anime' ? '🎌' : (type === 'films' ? '🎬' : '📺');
    const emptyLabel = type === 'films' ? 'Appuie pour choisir un film' : type === 'series' ? 'Appuie pour choisir une série' : 'Appuie pour choisir un animé';
    let html = `<div class="top-section">
      <div class="top-section-title">${title}</div>`;

    arr.forEach((item, i) => {
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
      const rankLabel = i < 3 ? MEDALS[i] : `#${i+1}`;

      if (item) {
        const cached = posterCache[item.search];
        const posterHTML = cached
          ? `<div class="top-poster"><img src="${cached}" onerror="this.parentElement.innerHTML='${icon}'" /></div>`
          : `<div class="top-poster" data-tsearch="${item.search.replace(/"/g,'&quot;')}" data-ttype="${type}">${icon}</div>`;

        html += `<div class="top-slot filled">
          <span class="top-rank ${rankClass}">${rankLabel}</span>
          ${posterHTML}
          <div class="top-info"><div class="top-title">${item.label}</div></div>
          <button class="top-remove" onclick="removeFromTop('${type}',${i})">✕</button>
        </div>`;
      } else {
        html += `<div class="top-slot" onclick="openModal(${i},'${type}')" style="cursor:pointer;border-style:dashed;">
          <span class="top-rank ${rankClass}">${rankLabel}</span>
          <div class="top-poster" style="border-style:dashed;color:#333;">+</div>
          <div class="top-info"><span class="top-empty-label">${emptyLabel}</span></div>
        </div>`;
      }
    });

    html += `</div>`;
    return html;
  };

  let html = renderSection('🎬 Top 10 Films', topFilms, 'films')
           + renderSection('📺 Top 10 Séries', topSeries, 'series')
           + renderSection('🎌 Top 10 Animés', topAnime, 'anime');
  content.innerHTML = html;

  content.querySelectorAll('[data-tsearch]').forEach(async el => {
    const s = el.getAttribute('data-tsearch');
    const t = el.getAttribute('data-ttype');
    el.removeAttribute('data-tsearch');
    el.removeAttribute('data-ttype');
    const url = await fetchPoster(s, t === 'series');
    if (url) el.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='🎬'" />`;
  });
}

function toggleItem(key) {
  checked[key] = !checked[key];

  const isSeen = checked[key];

  // Format chips (séries)
  const chip = document.querySelector(`.sl-chip[data-skey="${key.replace(/"/g,'&quot;')}"]`);
  if (chip) {
    chip.classList.toggle('checked', isSeen);
    // Refresh genre bar via chip
    const block = chip.closest('.genre-block');
    if (block) {
      const chips = [...block.querySelectorAll('.sl-chip[data-skey]')];
      const done = chips.filter(c => checked[c.dataset.skey]).length;
      const total = chips.length;
      const pct = total > 0 ? (done/total)*100 : 0;
      const color = done === total && total > 0 ? '#4ade80' : '#E8C547';
      const gc = block.querySelector('.genre-count');
      if (gc) { gc.textContent = `${done}/${total}`; gc.style.color = color; }
      const bar = block.querySelector('.genre-bar');
      if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
    }
    updateGlobalCounter();
    return;
  }

  // Format classique (films)
  const row = document.querySelector(`.episode-row[data-key="${key.replace(/"/g,'&quot;')}"]`);
  if (!row) return;
  row.classList.toggle('seen', isSeen);
  row.querySelector('.checkbox').classList.toggle('checked', isSeen);
  row.querySelector('.ep-label').classList.toggle('seen', isSeen);
  refreshSagaCount(row);
  refreshGenreBar(row);
  updateGlobalCounter();
}

function refreshSagaCount(row) {
  const block = row.closest('.saga-block');
  if (!block) return;
  const rows = block.querySelectorAll('.episode-row:not(.soon)');
  const done = [...rows].filter(r => r.classList.contains('seen')).length;
  block.querySelector('.saga-count').textContent = `${done}/${rows.length}`;
}

function refreshGenreBar(row) {
  const block = row.closest('.genre-block');
  if (!block) return;
  const rows = block.querySelectorAll('.episode-row:not(.soon)');
  const done = [...rows].filter(r => r.classList.contains('seen')).length;
  const total = rows.length;
  const pct = total > 0 ? (done/total)*100 : 0;
  const color = done === total ? '#4ade80' : '#E8C547';
  const gc = block.querySelector('.genre-count');
  gc.textContent = `${done}/${total}`;
  gc.style.color = color;
  const bar = block.querySelector('.genre-bar');
  bar.style.width = pct + '%';
  bar.style.background = color;
}

function updateGlobalCounter() {
  let total = 0, done = 0;
  Object.entries(DATA).forEach(([tab, section]) =>
    Object.values(section).forEach(sagas =>
      sagas.forEach(s => s.items.forEach((item, i) => {
        if (item.label.includes('à venir')) return;
        total++;
        if (checked[`${tab}||${s.saga}||${i}`]) done++;
      }))
    )
  );
  // Ajouter les animés (1 point par saison, ou 1 point pour les films)
  Object.values(ANIME_DATA).forEach(animes =>
    animes.forEach(a => {
      if (a.film) {
        total++;
        if (animeChecked[`anime||${a.titre}||Film`]) done++;
      } else {
        for (let s = 1; s <= a.saisons; s++) {
          total++;
          if (animeChecked[`anime||${a.titre}||S${s}`]) done++;
        }
      }
    })
  );
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('global-bar').style.width = total > 0 ? `${(done/total)*100}%` : '0%';
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search').value = '';
  document.getElementById('search').style.display = (tab === 'classement' || tab === 'decouvrir') ? 'none' : 'block';
  showViewToggle(tab === 'films' || tab === 'series' || tab === 'anime');
  if (tab === 'classement') renderClassement();
  else if (tab === 'anime') renderAnime();
  else if (tab === 'decouvrir') renderDecouvrir();
  else render();
}

function filterContent() {
  if (activeTab === 'anime') renderAnime();
  else render();
}

async function loadVisiblePosters() {
  const isSeries = activeTab === 'series';
  const pending = document.querySelectorAll('[data-search]');
  for (const el of pending) {
    const s = el.getAttribute('data-search');
    el.removeAttribute('data-search');
    const url = await fetchPoster(s, isSeries);
    if (url) {
      el.innerHTML = `<img src="${url}" alt="" onerror="this.parentElement.innerHTML='🎬'" />`;
    } else {
      el.innerHTML = '🎬';
    }
    el.classList.remove('loading');
    await new Promise(r => setTimeout(r, 80));
  }
}

// ── RENDU CARTE ANIMÉS ──
function renderCarteAnime(search) {
  const content = document.getElementById('content');
  const statusLabel = { termine:'Terminé','en-cours':'En cours','en-attente':'En attente',inacheve:'Inachevé' };
  const statusClass = { termine:'csb-termine','en-cours':'csb-en-cours','en-attente':'csb-en-attente',inacheve:'csb-inacheve' };
  let html = '', anyVisible = false;

  Object.entries(ANIME_DATA).forEach(([genre, animes]) => {
    const filtered = search ? animes.filter(a => a.titre.toLowerCase().includes(search)) : animes;
    if (!filtered.length) return;
    anyVisible = true;

    let gDone = 0, gTotal = 0;
    filtered.forEach(a => {
      const saisonsDispo = a.episodesSortis !== undefined ? a.episodesSortis : (a.film ? 1 : a.saisons);
      if (a.film) { if (saisonsDispo > 0) { gTotal++; if (animeChecked[`anime||${a.titre}||Film`]) gDone++; } }
      else { for (let s = 1; s <= saisonsDispo; s++) { gTotal++; if (animeChecked[`anime||${a.titre}||S${s}`]) gDone++; } }
    });
    const gPct = gTotal > 0 ? (gDone/gTotal)*100 : 0;
    const gColor = gDone === gTotal && gTotal > 0 ? '#4ade80' : '#E8C547';

    html += `<div class="genre-block"><div class="genre-header">
      <span class="genre-name">${genre}</span>
      <span class="genre-count" style="color:${gColor}">${gDone}/${gTotal}</span>
      <div class="genre-bar-bg"><div class="genre-bar" style="width:${gPct}%;background:${gColor}"></div></div>
    </div><div class="cards-grid-wrap">`;

    filtered.forEach(anime => {
      const saisonsDispo = anime.episodesSortis !== undefined ? anime.episodesSortis : (anime.film ? 1 : anime.saisons);
      const cachedUrl = posterCache[anime.search];
      let posterHTML;
      if (cachedUrl !== undefined) {
        posterHTML = cachedUrl
          ? `<img src="${cachedUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'c-poster-icon\\'>🎌</div>'" style="width:100%;height:100%;object-fit:cover;display:block;"/>`
          : `<div class="c-poster-icon">🎌</div>`;
      } else {
        posterHTML = `<div class="c-poster-icon">🎌</div>`;
      }

      const sbClass = statusClass[anime.statut] || 'csb-en-attente';
      const sbLabel = statusLabel[anime.statut] || anime.statut;

      let chipsHTML = '';
      if (anime.film) {
        if (saisonsDispo > 0) {
          const key = `anime||${anime.titre}||Film`;
          const done = !!animeChecked[key];
          const ka = key.replace(/"/g,'&quot;');
          chipsHTML = `<div class="c-chip film-chip${done?' done':''}" data-akey="${ka}" onclick="toggleAnimeSaison(this.dataset.akey)">Film</div>`;
        }
      } else {
        for (let s = 1; s <= (anime.saisons||1); s++) {
          if (s <= saisonsDispo) {
            const key = `anime||${anime.titre}||S${s}`;
            const done = !!animeChecked[key];
            const ka = key.replace(/"/g,'&quot;');
            chipsHTML += `<div class="c-chip${done?' done':''}" data-akey="${ka}" onclick="toggleAnimeSaison(this.dataset.akey)">S${s}</div>`;
          } else {
            chipsHTML += `<div class="c-chip locked">S${s}</div>`;
          }
        }
      }

      html += `<div class="c-card">
        <div class="c-poster" data-anime-search="${anime.search?.replace(/"/g,'&quot;')}">
          ${posterHTML}
          <div class="c-status-badge ${sbClass}">${sbLabel}</div>
        </div>
        <div class="c-body">
          <div class="c-title">${anime.titre}</div>
          <div class="c-chips">${chipsHTML}</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!anyVisible) {
    html = `<div class="empty"><div class="empty-icon">🎌</div><div class="empty-text">Aucun résultat</div></div>`;
  }

  content.innerHTML = html;
  loadVisiblePostersCartesAnime();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const section = DATA[activeTab];
  const content = document.getElementById('content');
  updateGlobalCounter();

  // ── MODE CARTE ──
  if (currentView === 'carte') {
    renderCarteFilmsSeries(section, search);
    return;
  }

  let html = '';
  let anyVisible = false;
  const isSeries = activeTab === 'series';

  Object.entries(section).forEach(([genre, sagas]) => {
    let filteredSagas = sagas;
    if (search) {
      filteredSagas = sagas.map(s => ({
        ...s,
        items: s.items.filter(it => it.label.toLowerCase().includes(search) || s.saga.toLowerCase().includes(search))
      })).filter(s => s.items.length > 0);
    }
    if (!filteredSagas.length) return;
    anyVisible = true;

    const origMap = Object.fromEntries(sagas.map(s => [s.saga, s]));
    const gTotal = filteredSagas.reduce((a, s) => a + s.items.filter(it => !it.label.includes('à venir')).length, 0);
    const gDone = filteredSagas.reduce((a, s) => {
      const orig = origMap[s.saga];
      return a + s.items.filter(it => {
        if (it.label.includes('à venir')) return false;
        const idx = orig.items.findIndex(o => o.label === it.label);
        return checked[`${activeTab}||${s.saga}||${idx}`];
      }).length;
    }, 0);
    const gPct = gTotal > 0 ? (gDone/gTotal)*100 : 0;
    const gColor = gDone === gTotal ? '#4ade80' : '#E8C547';

    html += `<div class="genre-block">
      <div class="genre-header">
        <span class="genre-name">${genre}</span>
        <span class="genre-count" style="color:${gColor}">${gDone}/${gTotal}</span>
        <div class="genre-bar-bg"><div class="genre-bar" style="width:${gPct}%;background:${gColor}"></div></div>
      </div>`;

    if (isSeries) {
      html += `<div class="saga-block">`;
      filteredSagas.forEach(({ saga, items }) => {
        const orig = origMap[saga];
        const cached = posterCache[items[0]?.search];
        let posterHTML;
        if (cached !== undefined) {
          posterHTML = cached
            ? `<div class="sl-poster"><img src="${cached}" alt="" onerror="this.parentElement.innerHTML='📺'"/></div>`
            : `<div class="sl-poster">📺</div>`;
        } else {
          posterHTML = `<div class="sl-poster loading" data-search="${(items[0]?.search||'').replace(/"/g,'&quot;')}"></div>`;
        }

        let chipsHTML = '';
        items.forEach((item) => {
          const idx = orig.items.findIndex(o => o.label === item.label);
          const key = `${activeTab}||${saga}||${idx}`;
          const isSeen = !!checked[key];
          const isSoon = item.label.includes('à venir');
          const displayLabel = item.label.replace(/ \(à venir\)/,'').replace(saga + ' ','').replace(saga,'').trim() || item.label;
          const keyAttr = key.replace(/"/g,'&quot;');
          if (isSoon) {
            chipsHTML += `<div class="sl-chip" style="opacity:0.4;cursor:default">
              <span class="sl-chip-label">${displayLabel}</span>
              <div class="sl-chip-box"></div>
            </div>`;
          } else {
            chipsHTML += `<div class="sl-chip${isSeen?' checked':''}" data-skey="${keyAttr}" onclick="toggleItem(this.dataset.skey)">
              <span class="sl-chip-label">${displayLabel}</span>
              <div class="sl-chip-box"><span class="sl-chip-check">✓</span></div>
            </div>`;
          }
        });

        html += `<div class="season-row">
          ${posterHTML}
          <span class="sl-title">${saga}</span>
          <div class="sl-seasons">${chipsHTML}</div>
        </div>`;
      });
      html += `</div>`;

    } else {
      filteredSagas.forEach(({ saga, items }) => {
        const orig = origMap[saga];
        const sDone = items.filter(it => {
          if (it.label.includes('à venir')) return false;
          const idx = orig.items.findIndex(o => o.label === it.label);
          return checked[`${activeTab}||${saga}||${idx}`];
        }).length;
        const sTotal = items.filter(it => !it.label.includes('à venir')).length;

        html += `<div class="saga-block">
          <div class="saga-header">
            <span class="saga-name">${saga}</span>
            <span class="saga-count">${sDone}/${sTotal}</span>
          </div>`;

        items.forEach((item) => {
          const idx = orig.items.findIndex(o => o.label === item.label);
          const key = `${activeTab}||${saga}||${idx}`;
          const isSeen = !!checked[key];
          const isSoon = item.label.includes('à venir');
          const displayLabel = item.label.replace(' (à venir)', '');
          const cachedUrl = posterCache[item.search];
          let posterHTML;
          if (cachedUrl !== undefined) {
            posterHTML = cachedUrl
              ? `<div class="poster-wrap"><img src="${cachedUrl}" alt="" onerror="this.parentElement.innerHTML='🎬'" /></div>`
              : `<div class="poster-wrap">🎬</div>`;
          } else {
            posterHTML = `<div class="poster-wrap loading" data-search="${item.search.replace(/"/g,'&quot;')}"></div>`;
          }
          const keyAttr = key.replace(/"/g,'&quot;');
          html += `<div class="episode-row${isSeen?' seen':''}${isSoon?' soon':''}" data-key="${keyAttr}" ${!isSoon?`onclick="toggleItem(this.dataset.key)"`:''}>
            ${posterHTML}
            <div class="checkbox${isSeen?' checked':''}${isSoon?' disabled':''}"><span class="checkmark">✓</span></div>
            <span class="ep-label${isSeen?' seen':''}${isSoon?' soon':''}">${displayLabel}</span>
            ${isSoon?'<span class="soon-badge">BIENTÔT</span>':''}
          </div>`;
        });
        html += `</div>`;
      });
    }

    html += `</div>`;
  });

  if (!anyVisible) {
    const q = document.getElementById('search').value;
    html = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat pour «<span> ${q} </span>»</div></div>`;
  }

  content.innerHTML = html;
  loadVisiblePosters();
}

// ── RENDU CARTE (Films & Séries) ──
function renderCarteFilmsSeries(section, search) {
  const content = document.getElementById('content');
  const isSeries = activeTab === 'series';
  let html = '';
  let anyVisible = false;

  Object.entries(section).forEach(([genre, sagas]) => {
    let filteredSagas = sagas;
    if (search) {
      filteredSagas = sagas.map(s => ({
        ...s,
        items: s.items.filter(it => it.label.toLowerCase().includes(search) || s.saga.toLowerCase().includes(search))
      })).filter(s => s.items.length > 0);
    }
    if (!filteredSagas.length) return;
    anyVisible = true;

    const origMap = Object.fromEntries(sagas.map(s => [s.saga, s]));
    const gTotal = filteredSagas.reduce((a, s) => a + s.items.filter(it => !it.label.includes('à venir')).length, 0);
    const gDone = filteredSagas.reduce((a, s) => {
      const orig = origMap[s.saga];
      return a + s.items.filter(it => {
        if (it.label.includes('à venir')) return false;
        const idx = orig.items.findIndex(o => o.label === it.label);
        return checked[`${activeTab}||${s.saga}||${idx}`];
      }).length;
    }, 0);
    const gPct = gTotal > 0 ? (gDone/gTotal)*100 : 0;
    const gColor = gDone === gTotal ? '#4ade80' : '#E8C547';

    html += `<div class="genre-block">
      <div class="genre-header">
        <span class="genre-name">${genre}</span>
        <span class="genre-count" style="color:${gColor}">${gDone}/${gTotal}</span>
        <div class="genre-bar-bg"><div class="genre-bar" style="width:${gPct}%;background:${gColor}"></div></div>
      </div>
      <div class="cards-grid-wrap">`;

    filteredSagas.forEach(({ saga, items }) => {
      const orig = origMap[saga];
      const searchKey = isSeries ? items[0]?.search : items[0]?.search;
      const cachedUrl = posterCache[searchKey];
      let posterHTML;
      const icon = isSeries ? '📺' : '🎬';
      if (cachedUrl !== undefined) {
        posterHTML = cachedUrl
          ? `<img src="${cachedUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'c-poster-icon\\'>${icon}</div>'" style="width:100%;height:100%;object-fit:cover;display:block;"/>`
          : `<div class="c-poster-icon">${icon}</div>`;
      } else {
        posterHTML = `<div class="c-poster-icon" data-search="${searchKey?.replace(/"/g,'&quot;')}">${icon}</div>`;
      }

      let chipsHTML = '';
      items.forEach((item) => {
        const idx = orig.items.findIndex(o => o.label === item.label);
        const key = `${activeTab}||${saga}||${idx}`;
        const isSeen = !!checked[key];
        const isSoon = item.label.includes('à venir');
        const rawLabel = item.label.replace(/ \(à venir\)/,'');
        const shortLabel = rawLabel.replace(saga + ' ','').replace(saga,'').trim() || rawLabel;
        const displayLabel = shortLabel.length > 0 ? shortLabel : rawLabel;
        const keyAttr = key.replace(/"/g,'&quot;');
        if (isSoon) {
          chipsHTML += `<div class="c-chip locked">${displayLabel}</div>`;
        } else {
          chipsHTML += `<div class="c-chip${isSeen?' done':''}" data-key="${keyAttr}" onclick="toggleItem(this.dataset.key)">${displayLabel}</div>`;
        }
      });

      html += `<div class="c-card">
        <div class="c-poster" data-search-poster="${searchKey?.replace(/"/g,'&quot;')}" data-tab="${activeTab}">
          ${posterHTML}
        </div>
        <div class="c-body">
          <div class="c-title">${saga}</div>
          <div class="c-chips">${chipsHTML}</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!anyVisible) {
    const q = document.getElementById('search').value;
    html = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">Aucun résultat pour «<span> ${q} </span>»</div></div>`;
  }

  content.innerHTML = html;
  loadVisiblePostersCartes();
}

function loadVisiblePostersCartes() {
  const isSeries = activeTab === 'series';
  const icon = isSeries ? '📺' : '🎬';
  document.querySelectorAll('.c-poster[data-search-poster]').forEach(el => {
    const search = el.dataset.searchPoster;
    if (!search) return;
    function injectImg(url) {
      if (url) {
        const img = document.createElement('img');
        img.src = url; img.alt = '';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onerror = () => { el.querySelector('img')?.remove(); if (!el.querySelector('.c-status-badge')) el.innerHTML = `<div class="c-poster-icon">${icon}</div>`; };
        const iconEl = el.querySelector('.c-poster-icon');
        if (iconEl) iconEl.replaceWith(img); else if (!el.querySelector('img')) el.prepend(img);
      }
    }
    if (posterCache[search] !== undefined) {
      injectImg(posterCache[search]);
    } else {
      fetchPoster(search, isSeries).then(url => {
        posterCache[search] = url || '';
        injectImg(url);
      });
    }
  });
}

function loadVisiblePostersCartesAnime() {
  document.querySelectorAll('.c-poster[data-anime-search]').forEach(el => {
    const search = el.dataset.animeSearch;
    if (!search) return;
    function injectImg(url) {
      if (url) {
        const img = document.createElement('img');
        img.src = url; img.alt = '';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onerror = () => {};
        const iconEl = el.querySelector('.c-poster-icon');
        if (iconEl) iconEl.replaceWith(img); else if (!el.querySelector('img')) el.prepend(img);
      }
    }
    if (posterCache[search] !== undefined) {
      injectImg(posterCache[search]);
    } else {
      fetchPoster(search, true).then(url => {
        posterCache[search] = url || '';
        injectImg(url);
      });
    }
  });
}

// Initialisation
showViewToggle(true);
document.getElementById('btn-liste').classList.toggle('active', currentView === 'liste');
document.getElementById('btn-carte').classList.toggle('active', currentView === 'carte');
render();
